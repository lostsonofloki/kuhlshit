    <!--
      Preload the above-the-fold mascot (LCP candidate). Responsive preload
      with imagesrcset/imagesizes so the browser fetches the smallest variant
      that matches the actual rendered size (~140px mobile, ~220px desktop).
    -->
    <link
      rel="preload"
      as="image"
      href="/resources/porchfest/mascot-cat@480.webp"
      imagesrcset="/resources/porchfest/mascot-cat@480.webp 480w, /resources/porchfest/mascot-cat@960.webp 960w, /resources/porchfest/mascot-cat.webp 1400w"
      imagesizes="(max-width: 768px) 140px, 220px"
      fetchpriority="high"
      type="image/webp"
    />

    <!--
      Fonts: load non-render-blocking via the print-media swap trick.
      Trimmed Montserrat weights from 5 -> 2 (600 for body headings, 700 for buttons).
      Kept Permanent Marker because the hero logo/title use it.
      Inter is loaded only if used elsewhere (removed 500/600 weights).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Montserrat:wght@600;700&family=Inter:wght@400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Montserrat:wght@600;700&family=Inter:wght@400&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Montserrat:wght@600;700&family=Inter:wght@400&display=swap"

    <!--
      Google Analytics: moved to end of body and loaded on idle so it never
      blocks the main thread during critical render path. The gtag API still
      works because window.dataLayer is a plain array shim.
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'G-VJKFGV1YCV');
      (window.requestIdleCallback || function (cb) { setTimeout(cb, 2500); })(function () {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-VJKFGV1YCV';
        document.head.appendChild(s);
      });
    </script>
