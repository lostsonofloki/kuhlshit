<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta name="description" content="Porch Talk - Engaging conversations and community discussions">
    <title>Porch Talk - Kuhlshit.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #e0e0e0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #0f0f1e;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            padding: 30px;
        }

        header {
            background: linear-gradient(90deg, #0f3460 0%, #1a1a2e 100%);
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .podcast-embed {
            margin: 20px 0;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #0f0f1e;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            padding: 30px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
            position: relative;
        }

        #search-input {
            flex: 1;
            max-width: 600px;
            padding: 15px 20px 15px 50px;
            border-radius: 50px;
            border: none;
            background-color: #222;
            color: #e0e0e0;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        #search-input:focus {
            outline: none;
            box-shadow: 0 4px 15px rgba(76, 201, 240, 0.5);
            background-color: #2a2a3a;
        }

        #search-input::placeholder {
            color: #aaa;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #4cc9f0;
            font-size: 20px;
        }

        #search-button, #reset-button {
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(90deg, #4cc9f0, #3a86ff);
            color: #0f0f1e;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        #search-button:hover, #reset-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
            background: linear-gradient(90deg, #3aa1c5, #2a6fd9);
        }

        .results-count {
            text-align: center;
            margin: 10px 0 20px;
            color: #4cc9f0;
            font-weight: bold;
        }

        .youtube-video-item {
            background: linear-gradient(to bottom, #1e1e2e, #252536);
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #2a2a3a;
        }

        .youtube-video-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-color: #4cc9f0;
        }

        .youtube-video-item h3 {
            color: #4cc9f0;
            margin: 0 0 12px 0;
            font-size: 1.3rem;
        }

        .youtube-video-item img {
            width: 100%;
            border-radius: 8px;
            margin: 10px 0;
            transition: opacity 0.3s ease;
        }

        .youtube-video-item img:hover {
            opacity: 0.9;
        }

        .youtube-video-item a {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .video-description {
            color: #c0c0c0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #4cc9f0;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .home-button {
            display: inline-block;
            color: #4cc9f0;
            text-decoration: none;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 50px;
            background: linear-gradient(90deg, rgba(76, 201, 240, 0.1), rgba(58, 134, 255, 0.1));
            transition: all 0.3s ease;
            border: 1px solid rgba(76, 201, 240, 0.3);
            align-self: center;
        }

        .home-button:hover {
            background: linear-gradient(90deg, rgba(76, 201, 240, 0.2), rgba(58, 134, 255, 0.2));
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-decoration: none;
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }
            
            header {
                padding: 20px 15px;
            }
            
            header h1 {
                font-size: 2rem;
            }
            
            .search-container {
                flex-direction: column;
                gap: 10px;
            }
            
            #search-input {
                max-width: 100%;
            }
            
            #search-button, #reset-button {
                width: 100%;
            }
            
            .youtube-video-item {
                padding: 15px;
            }
            
            .results-count {
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            header h1 {
                font-size: 1.6rem;
            }
            
            .container {
                padding: 15px 10px;
            }
            
            .youtube-video-item {
                padding: 12px;
            }
            
            .home-button {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #4cc9f0;
            text-decoration: none;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 50px;
            background: linear-gradient(90deg, rgba(76, 201, 240, 0.1), rgba(58, 134, 255, 0.1));
            transition: all 0.3s ease;
            border: 1px solid rgba(76, 201, 240, 0.3);
        }

        .back-link:hover {
            background: linear-gradient(90deg, rgba(76, 201, 240, 0.2), rgba(58, 134, 255, 0.2));
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-decoration: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #4cc9f0;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 15px;
            border-radius: 5px;
            background-color: rgba(76, 201, 240, 0.1);
            transition: background-color 0.3s;
        }

        .back-link:hover {
            background-color: rgba(76, 201, 240, 0.2);
            text-decoration: underline;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
            color: #a0a0a0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <div>
                    <h1>Porch Talk</h1>
                    <p>Engaging conversations and community discussions</p>
                </div>
                <a href="index.html" class="home-button">← Home</a>
            </div>
        </header>
        
        <main>
            <div class="episode-list">
                <h2>YouTube Episodes</h2>
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="Search for episodes...">
                    <button id="search-button">Search</button>
                    <button id="reset-button">Show All</button>
                </div>
                <div class="results-count" id="results-count">Loading videos...</div>
                <div id="youtube-videos-container">
                    <p>Loading YouTube videos...</p>
                </div>
                <div class="load-more-container" style="text-align: center; margin: 20px 0;">
                    <button id="load-more-button" style="display: none; padding: 12px 25px; border-radius: 50px; border: none; background: linear-gradient(90deg, #4cc9f0, #3a86ff); color: #0f0f1e; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);">
                        Load More Episodes
                    </button>
                </div>
            </div>
        </main>
            
            <script>
                async function fetchYouTubeVideos() {
                    const apiKey = 'AIzaSyBzicLYfHpJf234Vb5rIf--lRKdQoO4YNs';
                    // Using playlistItems endpoint to get videos from a specific playlist
                    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=PLzKakvgn9O5RUCNYT1QL0LQ_D_T3WSqdu&maxResults=10&key=${apiKey}`;
                    
                    try {
                        console.log('Fetching from URL:', url); // Debug log
                        const response = await fetch(url);
                        console.log('Response status:', response.status); // Debug log
                        
                        if (!response.ok) {
                            throw new Error(`HTTP error! Status: ${response.status}`);
                        }
                        
                        const data = await response.json();
                        console.log('Data received:', data); // Debug log
                        
                        const container = document.getElementById('youtube-videos-container');
                        
                        if (!data.items || data.items.length === 0) {
                            container.innerHTML = '<p>No videos found in this playlist.</p>';
                            return;
                        }
                        
                        container.innerHTML = '';
                        
                        data.items.forEach(item => {
                            console.log('Processing item:', item); // Debug log
                            const video = item.snippet;
                            const videoId = video.resourceId.videoId; // For playlistItems endpoint, videoId is in snippet.resourceId.videoId
                            
                            const videoElement = document.createElement('div');
                            videoElement.className = 'youtube-video-item';
                            
                            videoElement.innerHTML = `
                                <h3>${video.title}</h3>
                                <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank">
                                    <img src="${video.thumbnails.high.url}" alt="${video.title}">
                                </a>
                                <p>${video.description.substring(0, 150)}...</p>
                            `;
                            
                            container.appendChild(videoElement);
                        });
                    } catch (error) {
                        console.error('Error fetching YouTube videos:', error);
                        console.error('Error details:', error.message); // More detailed error
                        const container = document.getElementById('youtube-videos-container');
                        container.innerHTML = `<p>Failed to load videos: ${error.message}</p>`;
                    }
                }
                
                // Declare global variables
                let allVideos = [];
                let currentlyDisplayedVideos = [];
                const videosPerLoad = 12;
                let videosToShow = 12;
                
                // Define functions
                function filterVideos(searchTerm) {
                    if (!searchTerm.trim()) {
                        displayFirstSet(allVideos);
                        return;
                    }
                    
                    const filteredVideos = allVideos.filter(video => 
                        video.title.toLowerCase().includes(searchTerm) || 
                        video.description.toLowerCase().includes(searchTerm)
                    );
                    
                    displayFilteredVideos(filteredVideos);
                }
                
                
                // Function to reset and display the first set of videos
                function displayFirstSet(videos) {
                    allVideos = [...videos];
                    currentlyDisplayedVideos = allVideos.slice(0, videosToShow);
                    
                    const container = document.getElementById('youtube-videos-container');
                    const resultsCount = document.getElementById('results-count');
                    const loadMoreButton = document.getElementById('load-more-button');
                    
                    container.innerHTML = '';
                    
                    // Update results count
                    const totalResults = videos.length;
                    const shownResults = currentlyDisplayedVideos.length;
                    resultsCount.textContent = `${shownResults} of ${totalResults} video${totalResults !== 1 ? 's' : ''} shown`;
                    
                    currentlyDisplayedVideos.forEach(video => {
                        const videoElement = document.createElement('div');
                        videoElement.className = 'youtube-video-item';
                        
                        videoElement.innerHTML = `
                            <h3>${video.title}</h3>
                            <a href="https://www.youtube.com/watch?v=${video.videoId}" target="_blank">
                                <img src="${video.thumbnail}" alt="${video.title}">
                            </a>
                            <p class="video-description">${video.description.substring(0, 150)}${video.description.length > 150 ? '...' : ''}</p>
                        `;
                        
                        container.appendChild(videoElement);
                    });
                    
                    // Show/hide load more button based on remaining videos
                    if (currentlyDisplayedVideos.length < allVideos.length) {
                        loadMoreButton.style.display = 'inline-block';
                    } else {
                        loadMoreButton.style.display = 'none';
                    }
                }
                
                // Function to show more videos
                function showMoreVideos() {
                    const startIndex = currentlyDisplayedVideos.length;
                    const endIndex = Math.min(startIndex + videosPerLoad, allVideos.length);
                    const newVideos = allVideos.slice(startIndex, endIndex);
                    
                    currentlyDisplayedVideos = currentlyDisplayedVideos.concat(newVideos);
                    
                    const container = document.getElementById('youtube-videos-container');
                    const resultsCount = document.getElementById('results-count');
                    const loadMoreButton = document.getElementById('load-more-button');
                    
                    // Don't clear the container, just append new videos
                    newVideos.forEach(video => {
                        const videoElement = document.createElement('div');
                        videoElement.className = 'youtube-video-item';
                        
                        videoElement.innerHTML = `
                            <h3>${video.title}</h3>
                            <a href="https://www.youtube.com/watch?v=${video.videoId}" target="_blank">
                                <img src="${video.thumbnail}" alt="${video.title}">
                            </a>
                            <p class="video-description">${video.description.substring(0, 150)}${video.description.length > 150 ? '...' : ''}</p>
                        `;
                        
                        container.appendChild(videoElement);
                    });
                    
                    // Update results count
                    const totalResults = allVideos.length;
                    const shownResults = currentlyDisplayedVideos.length;
                    resultsCount.textContent = `${shownResults} of ${totalResults} video${totalResults !== 1 ? 's' : ''} shown`;
                    
                    // Show/hide load more button based on remaining videos
                    if (currentlyDisplayedVideos.length < allVideos.length) {
                        loadMoreButton.style.display = 'inline-block';
                    } else {
                        loadMoreButton.style.display = 'none';
                    }
                }
                
                // Function to display filtered videos (for search results)
                function displayFilteredVideos(videos) {
                    const container = document.getElementById('youtube-videos-container');
                    const resultsCount = document.getElementById('results-count');
                    const loadMoreButton = document.getElementById('load-more-button');
                    
                    if (videos.length === 0) {
                        container.innerHTML = '<p>No videos match your search.</p>';
                        resultsCount.textContent = 'No videos found';
                        loadMoreButton.style.display = 'none';
                        return;
                    }
                    
                    container.innerHTML = '';
                    
                    // Update results count
                    const totalResults = videos.length;
                    resultsCount.textContent = `${totalResults} video${totalResults !== 1 ? 's' : ''} found`;
                    
                    videos.forEach(video => {
                        const videoElement = document.createElement('div');
                        videoElement.className = 'youtube-video-item';
                        
                        videoElement.innerHTML = `
                            <h3>${video.title}</h3>
                            <a href="https://www.youtube.com/watch?v=${video.videoId}" target="_blank">
                                <img src="${video.thumbnail}" alt="${video.title}">
                            </a>
                            <p class="video-description">${video.description.substring(0, 150)}${video.description.length > 150 ? '...' : ''}</p>
                        `;
                        
                        container.appendChild(videoElement);
                    });
                    
                    // Hide load more button for search results
                    loadMoreButton.style.display = 'none';
                }
                
                // Initialize the page
                document.addEventListener('DOMContentLoaded', function() {
                    fetchYouTubeVideos();
                    
                    // Search functionality
                    const searchButton = document.getElementById('search-button');
                    const resetButton = document.getElementById('reset-button');
                    const searchInput = document.getElementById('search-input');
                    const loadMoreButton = document.getElementById('load-more-button');
                    
                    if (searchButton) {
                        searchButton.addEventListener('click', function() {
                            console.log('Search button clicked'); // Debug log
                            const searchTerm = searchInput.value.toLowerCase();
                            console.log('Search term:', searchTerm); // Debug log
                            filterVideos(searchTerm);
                        });
                    } else {
                        console.error('Search button not found'); // Debug log
                    }
                    
                    if (resetButton) {
                        // Reset functionality
                        resetButton.addEventListener('click', function() {
                            console.log('Reset button clicked'); // Debug log
                            searchInput.value = '';
                            displayFirstSet(allVideos);
                        });
                    } else {
                        console.error('Reset button not found'); // Debug log
                    }
                    
                    if (loadMoreButton) {
                        // Load more functionality
                        loadMoreButton.addEventListener('click', function() {
                            console.log('Load more button clicked'); // Debug log
                            showMoreVideos();
                        });
                    } else {
                        console.error('Load more button not found'); // Debug log
                    }
                    
                    if (searchInput) {
                        // Allow pressing Enter to trigger search
                        searchInput.addEventListener('keypress', function(event) {
                            if (event.key === 'Enter') {
                                console.log('Enter key pressed'); // Debug log
                                document.getElementById('search-button').click();
                            }
                        });
                    } else {
                        console.error('Search input not found'); // Debug log
                    }
                });
                
                function filterVideos(searchTerm) {
                    if (!searchTerm.trim()) {
                        displayVideos(allVideos);
                        return;
                    }
                    
                    const filteredVideos = allVideos.filter(video => 
                        video.title.toLowerCase().includes(searchTerm) || 
                        video.description.toLowerCase().includes(searchTerm)
                    );
                    
                    displayVideos(filteredVideos);
                }
                
                function displayVideos(videos) {
                    const container = document.getElementById('youtube-videos-container');
                    
                    if (videos.length === 0) {
                        container.innerHTML = '<p>No videos match your search.</p>';
                        return;
                    }
                    
                    container.innerHTML = '';
                    
                    videos.forEach(video => {
                        const videoElement = document.createElement('div');
                        videoElement.className = 'youtube-video-item';
                        
                        videoElement.innerHTML = `
                            <h3>${video.title}</h3>
                            <a href="https://www.youtube.com/watch?v=${video.videoId}" target="_blank">
                                <img src="${video.thumbnail}" alt="${video.title}">
                            </a>
                            <p>${video.description.substring(0, 150)}...</p>
                        `;
                        
                        container.appendChild(videoElement);
                    });
                }
                
                // Override the original fetchYouTubeVideos function to store videos
                const originalFetchYouTubeVideos = fetchYouTubeVideos;
                
                // Function to fetch all videos from a playlist using pagination
                async function fetchAllPlaylistVideos() {
                    const apiKey = 'AIzaSyBzicLYfHpJf234Vb5rIf--lRKdQoO4YNs';
                    let nextPageToken = null;
                    let allItems = [];
                    
                    do {
                        let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=PLzKakvgn9O5RUCNYT1QL0LQ_D_T3WSqdu&maxResults=50&key=${apiKey}`;
                        
                        if (nextPageToken) {
                            url += `&pageToken=${nextPageToken}`;
                        }
                        
                        try {
                            console.log('Fetching from URL:', url); // Debug log
                            const response = await fetch(url);
                            console.log('Response status:', response.status); // Debug log
                            
                            if (!response.ok) {
                                throw new Error(`HTTP error! Status: ${response.status}`);
                            }
                            
                            const data = await response.json();
                            console.log('Data received:', data); // Debug log
                            
                            if (data.items) {
                                allItems = allItems.concat(data.items);
                            }
                            
                            nextPageToken = data.nextPageToken;
                            
                            // Small delay to be respectful to the API
                            await new Promise(resolve => setTimeout(resolve, 100));
                            
                        } catch (error) {
                            console.error('Error fetching YouTube videos:', error);
                            console.error('Error details:', error.message); // More detailed error
                            return null;
                        }
                    } while (nextPageToken);
                    
                    return allItems;
                }
                
                // Function to fetch initial videos from a playlist
                async function fetchInitialVideos() {
                    const apiKey = 'AIzaSyBzicLYfHpJf234Vb5rIf--lRKdQoO4YNs';
                    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=PLzKakvgn9O5RUCNYT1QL0LQ_D_T3WSqdu&maxResults=12&key=${apiKey}`;
                    
                    try {
                        console.log('Fetching initial videos from URL:', url); // Debug log
                        const response = await fetch(url);
                        console.log('Response status:', response.status); // Debug log
                        
                        if (!response.ok) {
                            throw new Error(`HTTP error! Status: ${response.status}`);
                        }
                        
                        const data = await response.json();
                        console.log('Initial data received:', data); // Debug log
                        
                        return data.items || [];
                    } catch (error) {
                        console.error('Error fetching initial YouTube videos:', error);
                        return null;
                    }
                }
                
                fetchYouTubeVideos = async function() {
                    try {
                        const container = document.getElementById('youtube-videos-container');
                        const resultsCount = document.getElementById('results-count');
                        resultsCount.textContent = 'Loading videos...';
                        container.innerHTML = '<p>Loading initial videos from playlist...</p>';
                        
                        // First, fetch and display initial videos for quick UI feedback
                        const initialItems = await fetchInitialVideos();
                        
                        if (!initialItems || initialItems.length === 0) {
                            container.innerHTML = '<p>No videos found in this playlist.</p>';
                            resultsCount.textContent = 'No videos found';
                            return;
                        }
                        
                        // Store initial videos for immediate display
                        const initialVideos = initialItems.map(item => {
                            const video = item.snippet;
                            const videoId = video.resourceId.videoId;
                            
                            return {
                                title: video.title,
                                description: video.description,
                                thumbnail: video.thumbnails.high.url,
                                videoId: videoId
                            };
                        });
                        
                        // Display initial videos right away
                        displayFirstSet(initialVideos);
                        resultsCount.textContent = `${initialVideos.length} initial videos loaded (more loading...)`;
                        
                        // Then fetch all videos in the background
                        const allItems = await fetchAllPlaylistVideos();
                        
                        if (!allItems || allItems.length === 0) {
                            console.warn('Could not load all videos, using initial set');
                            return;
                        }
                        
                        // Update allVideos with the complete set
                        allVideos = allItems.map(item => {
                            const video = item.snippet;
                            const videoId = video.resourceId.videoId;
                            
                            return {
                                title: video.title,
                                description: video.description,
                                thumbnail: video.thumbnails.high.url,
                                videoId: videoId
                            };
                        });
                        
                        console.log('All videos stored:', allVideos); // Debug log
                        console.log(`Total videos loaded: ${allVideos.length}`); // Debug log
                        
                        // Update results count to show total videos loaded
                        resultsCount.textContent = `${allVideos.length} video${allVideos.length !== 1 ? 's' : ''} loaded from playlist`;
                        
                        // Refresh display with all videos if user hasn't searched yet
                        if (document.getElementById('search-input').value === '') {
                            displayFirstSet(allVideos);
                        }
                    } catch (error) {
                        console.error('Error in fetchYouTubeVideos:', error);
                        const container = document.getElementById('youtube-videos-container');
                        container.innerHTML = `<p>Failed to load videos: ${error.message}</p>`;
                    }
                };
            </script>
        </main>
        
        <footer>
            <a href="index.html" class="back-link">← Back to Kuhlshit.com</a>
            <p>&copy; 2026 Kuhlshit.com. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
